    margin:0;

}

    text-decoration:none;
    background:#ff4d6d;

    border-radius:20px;

<body>
<div class="letter">
<h1>Моей любимой Юле ❤️</h1>
<p>
Спасибо тебе за все моменты, которые мы пережили вместе.
</p>
<p>
За твою улыбку, поддержку, заботу и любовь.
</p>
<p>
За эти годы ты стала самым дорогим человеком в моей жизни.
</p>
<p>
Я очень ценю каждый день, проведённый рядом с тобой.
</p>

</p>
