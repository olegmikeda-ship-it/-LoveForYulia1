<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поиск Полночи</title>
<link rel="stylesheet" href="game.css">
</head>
<body>
    <audio id="bgMusic" autoplay loop>
    <source src="../music/boy.mp3" type="audio/mpeg">
</audio>
<div class="game">
    <img id="background">
    <div id="locationName"></div>
    <div id="storyText">
        Нажми на локацию для поиска подсказки
    </div>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
</div>
<script src="game.js"></script>
<script>
window.addEventListener("load", () => {
const music =
document.getElementById("bgMusic");
music.volume = 0.3;
music.play().catch(() => {
document.addEventListener("click", () => {
music.play();
},{once:true});
});
});
</script>
</body>
</html>
